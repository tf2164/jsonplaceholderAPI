<!DOCTYPE html>
<html lang="en">    

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Starter</title>

    <style>
         body {
            margin: 0;
            padding: 24px 16px;
            text-align: center;
            background-color: #dae0e6;
            color: #1c1c1c;
            font-family: "IBM Plex Sans", "Noto Sans", "Segoe UI", sans-serif;
        }
        h1 {
            margin-top: 0;
            color: #ff4500;
            font-size: 28px;
        }
        .container,
        .search-container,
        #postsContainer,
        div[style="margin-bottom: 20px;"] {
            max-width: 760px;
            margin-left: auto;
            margin-right: auto;
        }
        .container {
            background: #ffffff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 14px;
            text-align: left;
        }
        .search-input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 15px;
            margin-bottom: 12px;
        }
        button {
            border: 1px solid #0079d3;
            background: #0079d3;
            color: #fff;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 600;
            cursor: pointer;
            margin: 0 4px;
        }
        .post-card {
            border: 1px solid #ccc;
            border-radius: 10px;
            padding: 14px 16px;
            margin: 0 auto 12px;
            background: #fff;
            text-align: left;
        }
        .post-meta {
            margin: 0 0 8px;
            font-size: 12px;
            color: #787c7e;
            text-transform: lowercase;
        }
        .post-title {
            margin: 0 0 10px;
            font-size: 19px;
            line-height: 1.25;
            font-weight: 600;
        }
        .post-body {
            margin: 0;
            font-size: 15px;
            line-height: 1.55;
            color: #1a1a1b;
            white-space: pre-wrap;
        }
        .loading,
        .error {
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
        }
        
        </style>
</head>

<body>
    <h1>API Data Integration Challenge</h1>
    
    <div class="container">
        <h2>Challenge</h2>
        <p>Fetching data from the JSONPlaceholder API and displaying it.</p>
    
    </div>

    <!-- Search Section (Bonus Feature) -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Search posts by title...">
    </div>

    <!-- Control Buttons -->
    <div style="margin-bottom: 20px;">
        <button onclick="fetchPosts()">Load Posts</button>
        <button onclick="clearPosts()">Clear Posts</button>
    </div>

    <!-- Results Container -->
    <div id="postsContainer">
        <p class="loading"></p>
    </div>

    <script>
        // Global variables to store data
        let allPosts = [];
        let filteredPosts = [];

        // TODO: Implement this function
        async function fetchPosts() {
            const container = document.getElementById('postsContainer');
            
            // Step 1: Show loading state
            container.innerHTML = '<p class="loading">Loading posts...</p>';
            
            try {
                // Step 2: Fetch data from API
                // TODO: Add your fetch code here
            const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                
                // Step 3: Check if response is OK
                // TODO: Add error checking
                if(!response.ok){
                    throw new Error('Could not fetch posts');
                }
                
                // Step 4: Parse JSON data
                // TODO: Add JSON parsing
                const data = await response.json();
                
                // Step 5: Store and display data
                // TODO: Call displayPosts() function
                allPosts = data;
                filteredPosts = allPosts;
                displayPosts(allPosts);

                
                // Placeholder for testing - remove this when you implement the real fetch
                // setTimeout(() => {
                //     container.innerHTML = '<p class="error">⚠️ Implement the fetchPosts() function to load data!</p>';
                // }, 1000);
                
            } catch (error) {
                // Step 6: Handle errors
                console.error('Error fetching posts:', error);
                container.innerHTML = `<p class="error">❌ Error loading posts: ${error.message}</p>`;
            }
        }

        // TODO: Implement this function
        function displayPosts(posts) {
            const container = document.getElementById('postsContainer');
            
            if (!posts || posts.length === 0) {
                container.innerHTML = '<p class="error">No posts found.</p>';
                return;
            }

            // TODO: Create HTML for each post
            // Each post should be in a .post-card div with:
            // - .post-title for the title
            // - .post-body for the body text  
            // - .post-id for the post number
            const postsCards = posts.map(post => `
            <div class="post-card">
                <p class="post-meta">posted by u/user${post.userId} • post ${post.id}</p>
                <h3 class="post-title">${post.title}</h3>
                <p class="post-body">${post.body}</p>
            </div>
            `).join('');

            container.innerHTML = postsCards;
        }

        // Clear posts function (already implemented)
        function clearPosts() {
            allPosts = [];
            filteredPosts = [];
            document.getElementById('postsContainer').innerHTML = '<p class="loading">Posts cleared. Click "Load Posts" to fetch new data.</p>';
            document.getElementById('searchInput').value = '';
        }

        // BONUS: Search functionality
        function searchPosts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                filteredPosts = allPosts;
            } else {
                filteredPosts = allPosts.filter(post => 
                    post.title.toLowerCase().includes(searchTerm)
                );
            }
            
            displayPosts(filteredPosts);
        }

        // Add event listener for search
        document.getElementById('searchInput').addEventListener('input', searchPosts);

        // Example of expected API response (for reference):
        /*
        [
            {
                "userId": 1,
                "id": 1,
                "title": "sunt aut facere repellat provident occaecati excepturi optio reprehenderit",
                "body": "quia et suscipit suscipit recusandae consequuntur expedita et cum reprehenderit molestiae ut ut quas totam nostrum rerum est autem sunt rem eveniet architecto"
            },
            ...
        ]
        */
    </script>

 </body>








</html>
